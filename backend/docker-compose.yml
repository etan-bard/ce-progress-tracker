services:
  mongodb:
    image: mongodb/mongodb-community-server:8.2-ubi8
    container_name: ce-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=${MONGODB_USER}
      - MONGODB_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_INITDB_DATABASE=${MONGODB_DATABASE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongodb_data:/var/lib/mongodb

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ce-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_PASSWORD}
      - MSSQL_USER=${MSSQL_USER}
      - MSSQL_PID=Express
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U ${MSSQL_USER} -P ${MSSQL_PASSWORD} -C -Q 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - mssql_data:/var/opt/mssql

  goose:
    build:
      dockerfile: Dockerfile.goose
    container_name: ce-goose
    volumes:
      - ./database/migrations:/migrations
    environment:
      - GOOSE_DRIVER=mssql
      - GOOSE_DBSTRING=sqlserver://${MSSQL_USER}:${MSSQL_PASSWORD}@ce-sqlserver:1433?encrypt=disable
    command: up
    restart: "no"
    init: true
    depends_on:
      sqlserver:
        condition: service_healthy

  mongodb-restore:
    image: mongodb/mongodb-community-server:8.2-ubi8
    container_name: ce-mongodb-restore
    profiles:
      - manual
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./mongo.dump:/dump/mongo.dump:ro
    environment:
      - MONGODB_ROOT_USER=${MONGODB_USER}
      - MONGODB_ROOT_PASSWORD=${MONGODB_PASSWORD}
    command: >
      mongorestore --host mongodb --username ${MONGODB_USER} --password ${MONGODB_PASSWORD} --authenticationDatabase admin --drop --archive=/dump/mongo.dump --gzip
    restart: "no"

  mockery:
    image: vektra/mockery:latest
    container_name: ce-mockery
    profiles:
      - manual
    environment:
      - GOTOOLCHAIN=auto
    volumes:
      - .:/src
    working_dir: /src
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ce-api
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - MSSQL_HOST=sqlserver
      - MSSQL_PORT=1433
      - MSSQL_USER=${MSSQL_USER}
      - MSSQL_PASSWORD=${MSSQL_PASSWORD}
      - API_PORT=${API_PORT}
      - SCRIPT_BATCH_SIZE=${SCRIPT_BATCH_SIZE}
      - MAX_GOROUTINES=${MAX_GOROUTINES}
    volumes:
      - .:/app
    command: go run main.go
    depends_on:
      mongodb:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
      goose:
        condition: service_completed_successfully

volumes:
  mssql_data:
  mongodb_data: